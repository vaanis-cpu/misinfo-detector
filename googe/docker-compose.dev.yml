version: '3.8'

# MVP development stack - lighter weight, runs on limited resources

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - MISINFO_ENV=development
      - MISINFO_CONFIG=/app/config/config.yaml
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - misinfo-dev

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8501:8501"
    environment:
      - MISINFO_ENV=development
    volumes:
      - ./src:/app/src
    command: streamlit run src/dashboard/app.py --server.port 8501
    depends_on:
      - api
    networks:
      - misinfo-dev

networks:
  misinfo-dev:
    driver: bridge
